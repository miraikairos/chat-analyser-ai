 messages.sort(

// 🔥 find broken message
const broken = messages.find(m =>

console.log("BROKEN MESSAGE:", broken);
 const replyAvg = getReplySpeed(messages) || {};
 console.log("replyAvg:", replyAvg);

createReplyChart(replyAvg);

showCareResult(care);

/* ===== FIXED USER STATS ===== */
function isRealMessage(msg){

  if(!msg) return false;

  const text =
    (msg.message || "")
    .toLowerCase()
    .trim();

  // remove empty
  if(text.length < 2)
    return false;

  // ignore links
  if(text.includes("instagram.com"))
    return false;

  // ignore reactions
  if(text.includes("reacted"))
    return false;

  // ignore attachments
  if(text.includes("attachment"))
    return false;

  // ignore spam shares
  if(text.length > 500)
    return false;

  return true;
}
function userStats(messages){
  const users={};

  messages.forEach(m=>{
  if(!m.user) return;
    if(!users[m.user]){
      users[m.user]={messages:0,words:{},emojis:{},texts:[]};
    }
    
    let u=users[m.user];
   const msg = m.message || m.text || "";
u.texts.push(msg);
    u.messages++;

const cleanText = (m.message || "")
  .toLowerCase()
  .replace(/<media omitted>/gi, "")  // remove full phrase
  .replace(/media omitted/gi, "")    // remove variant
  .replace(/omitted/gi, "")          // safety remove
  .replace(/[^\w\s]/g, "");          // remove symbols

const words = cleanText.split(/\s+/);
    words.forEach(w=>{
      if(w.length>2){
        u.words[w]=(u.words[w]||0)+1;
      }
    });
    const stopWords = ["hai","the","and","for","you","this","that","are","was"];

words.forEach(w=>{
  if(w.length > 2 && !stopWords.includes(w)){
    u.words[w] = (u.words[w] || 0) + 1;
  }
});

    const emojis=[
  ...(m.message || "")
    .matchAll(/\p{Extended_Pictographic}/gu)
].map(e=>e[0]);

    emojis.forEach(e=>{
      u.emojis[e]=(u.emojis[e]||0)+1;
    });
  });

  return users;
}

function getTopWordsWithCount(obj,n=5){
  return Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,n);
}

function getPercent(obj){
  let total=Object.values(obj).reduce((a,b)=>a+b,0)||1;
  let result={};
  for(let k in obj){
    result[k]=Math.round((obj[k]/total)*100);
  }
  return result;
}

function analyzeBehavior(messages){
 let score={
  happy:0,
  sad:0,
  angry:0,
  sweet:0,
  kind:0,
  abusive:0,
  "depressing/short":0
};

 messages.forEach(text=>{
  if(!text) return;
  text = text.toLowerCase().trim();

  // ===== HAPPY =====
  const happyMatches = text.match(/😂|🤣|😆|😜|😝|😀|😁|😉|😗|😙|😋|😛|😊|👀|🫢|👽|💀|haha|hehe|lol|lmao|mja|nice|wow|fun|yes/g);
  if(happyMatches) score.happy += happyMatches.length;

  // ===== SAD =====
  const sadMatches = text.match(/😭|😢|😞|🙁|☹️|😕|sad|upset|cry|miss|hurt/g);
  if(sadMatches) score.sad += sadMatches.length;

  // ===== DEPRESSING / SHORT =====

  // 1. Emojis + words
  const depressingMatches = text.match(/😐|😔|😰|🥲|🫤|🤧|tired|alone|low|low text|low msg|no reply|dry chat|depressed|empty|nothing/g);
  if(depressingMatches){
    score["depressing/short"] += depressingMatches.length;
  }

  // 2. Short replies detection 🔥
  const shortReplies = ["ok","k","hmm","hmmm","hm","kk","ya","yes","no","h","👍"];

  if(text.length <= 3 || shortReplies.includes(text)){
    score["depressing/short"] += 1;
  }

  // ===== OTHER =====
  const angryMatches = text.match(/😡|🤨|😠|😤|😮‍💨|😒|🙄|😐|😑|🤐|🫡|angry|mad|annoy|irritate|frustrated/g);

if(angryMatches){
  score.angry += angryMatches.length;
}
  if(/love|❤️|luv|omg|miss|like|sex|hot|pyar/.test(text)) score.sweet++;
  if(/thanks|sorry|pls|please/.test(text)) score.kind++;
  if(/bc|mc|fuck|shit|abe/.test(text)) score.abusive++;

});

  return score;
}

function advancedRelationship(messages){
  messages =
  messages.filter(isRealMessage);
  messages.sort(
  (a,b)=>getTime(a)-getTime(b)
);
  if(messages.length < 5){
  return {
    status:"🙂 Low Activity",
    score:20
  };
}
  const users = [...new Set(messages.map(m=>m.user))];

  // Only for 2 users
 if(users.length !== 2){

  let activityScore = messages.length;

  // simple scaling
  let score = Math.min(100, Math.round(activityScore / 5));

  return {
    status: "🤝 Chat Bond",
    score: score
  };
}

  let score = {
    love:0,
    fun:0,
    emotional:0
  };

  messages.forEach(m=>{
    const text = (m.message || m.text || "").toLowerCase();

    // ===== 💖 ROMANTIC =====
    const romanticMatches = text.match(/love|luv|baby|jaan|miss you|i like you|🥰|🥵|😍|🤩|👄|❤️|🩷|🧡|💛|💚|💙|🩵|💜|🖤|🩶|🤍|🤎|❤️‍🔥|❤️‍🩹|❣️|💕|💞|💓|💗|💖|💘|💝/g);
    if(romanticMatches){
      score.love += romanticMatches.length;
    }

    // ===== 😂 FRIENDS / FUN =====
    const funMatches = text.match(/😃|😄|😁|😆|😅|😂|🤣|🥲|🥹|☺️|😊|😇|🙂|🙃|😉|😌|lol|lmao|haha|hehe|fun|masti|bro|bhai/g);
    if(funMatches){
      score.fun += funMatches.length;
    }

    // ===== 😭 EMOTIONAL =====
    const emotionalMatches = text.match(/🤧|😭|😢|😞|😔|😟|😣|😖|😫|😩|😓|😱|sad|cry|hurt|miss|alone|tired|depressed|pain|stress/g);
    if(emotionalMatches){
      score.emotional += emotionalMatches.length;
    }

  });

  // ===== 🎯 SCORE CALCULATION =====
  let finalScore = 0;

  finalScore += score.fun * 2;
  finalScore += score.love * 4;
  finalScore += score.emotional * 3;
finalScore =
  Math.round(
    (finalScore / messages.length) * 18
  );

finalScore =
  Math.max(
    15,
    Math.min(100, finalScore)
  );

  // ===== 🎭 RELATION TYPE =====
  let status = "🤝 Friends";

  if(score.love > 25){
    status = "💖 Lover";
  }
  else if(score.love > 10){
    status = "💕 Romantic";
  }
  else if(score.fun > score.emotional){
    status = "😂 Best Friends";
  }
 if(finalScore < 35 && messages.length > 50){

  finalScore += 20;
}
  return {
    status,
    score: finalScore
  };
}
function getActivityInsights(activity){
  let html = "";

  Object.keys(activity).forEach(user=>{
    const hours = activity[user];
    const max = Math.max(...hours);

    const label = [

function getTime(m){
  if(!m.date || !m.time) return 0;

  let [time, modifier] = m.time.split(" ");
  let [h, min] = time.split(":");

  h = parseInt(h);
  min = parseInt(min);

  if(modifier){
    if(modifier.toLowerCase() === "pm" && h !== 12) h += 12;
    if(modifier.toLowerCase() === "am" && h === 12) h = 0;
  }

  let [d, mo, y] = m.date.split("/");

  // fix year like 26 → 2026
  if(y.length === 2) y = "20" + y;

  return new Date(y, mo - 1, d, h, min).getTime();
}

function getReplySpeed(messages){
  const replyTimes = {};

  messages.sort((a,b)=>getTime(a) - getTime(b));

  for(let i = 1; i < messages.length; i++){
    const prev = messages[i-1];
    const curr = messages[i];

    // only when user switches
    if(prev.user !== curr.user){

      const t1 = getTime(prev);
      const t2 = getTime(curr);

      const diff = (t2 - t1) / 1000;

      // ✅ ONLY count real replies (within 30 min)
      if(diff > 0 && diff < 3600){

        if(!replyTimes[curr.user]){
          replyTimes[curr.user] = [];
        }

        replyTimes[curr.user].push(diff);
      }
    }
  }

  const avg = {};

  Object.keys(replyTimes).forEach(user=>{
    const arr = replyTimes[user];
    const sum = arr.reduce((a,b)=>a+b,0);
    avg[user] = sum / arr.length;
  });

  return avg;
}
function getReplySpeedPairs(messages){

    const prev = messages[i-1];
    const curr = messages[i];

      // 🔥 find START of previous user's block
      let j = i - 1;

      while(j > 0 && messages[j-1].user === prev.user){
        j--;
      }

      const firstPrev = messages[j];

      const t1 = getTime(firstPrev);
const t2 = getTime(curr);
      const diff = (t2 - t1) / 1000;

     if(diff > 1){ // 12 HOURS

        const key = `${prev.user} → ${curr.user}`;

        if(!pairs[key]){
          pairs[key] = [];
        }

        pairs[key].push(diff);
      }
    }
  }

  const avg = {};

function getConversationStarters(messages){

  messages =
    messages
      .filter(isRealMessage)
      .sort((a,b)=>
        getTime(a)-getTime(b)
      );

  const starters = {};

  let lastTime = 0;

  for(let i = 0; i < messages.length; i++){

    const curr = messages[i];
    const t = getTime(curr);

    // first message
    if(i === 0){

      starters[curr.user] =
        (starters[curr.user] || 0) + 1;

      lastTime = t;
      continue;
    }

    const diff =
      (t - lastTime) / 1000;

    // new convo after 15 mins
    if(diff > 900){

      starters[curr.user] =
        (starters[curr.user] || 0) + 1;
    }

    lastTime = t;
  }

  // ensure every user exists
  messages.forEach(m=>{

    if(!starters[m.user]){

      starters[m.user] = 1;
    }
  });

  return starters;
}

function calculateWhoCares(messages){
  if(!messages.length) return {};

  const users = [...new Set(messages.map(m => m.user))];
  if(users.length < 2) return {};

  const filtered =
  messages.filter(isRealMessage);

const stats =
  userStats(filtered);
  const reply = getReplySpeed(messages) || {};

  // normalize reply speed
  const replyScore = {};
  const values = Object.values(reply);

  const max = values.length ? Math.max(...values) : 0;
  const min = values.length ? Math.min(...values) : 0;

  users.forEach(u => {
    if(reply[u] == null){
      replyScore[u] = 0;
    } else {
      replyScore[u] = max === min ? 1 :
        1 - ((reply[u] - min) / (max - min));
    }
  });

  // conversation starters
  const initiation = {};
  users.forEach(u => initiation[u] = 0);

  for(let i=1;i<messages.length;i++){
    if(messages[i].user !== messages[i-1].user){
      initiation[messages[i].user]++;
    }
  }

  const totalInitiations =
    Object.values(initiation).reduce((a,b)=>a+b,0) || 1;

  const scores = {};

  users.forEach(u => {
    const msgScore = (stats[u]?.messages || 0) / messages.length;
    const repScore = replyScore[u] || 0;
    const initScore = initiation[u] / totalInitiations;

    scores[u] =
      (msgScore * 0.4) +
      (repScore * 0.4) +
      (initScore * 0.2);
  });

  return scores;
}

function detectRedFlags(messages){

  const stats = userStats(messages);
  const ghost = getGhosting(messages);
  const starters =
    getConversationStarters(messages);

  const flags = {};

  Object.keys(stats).forEach(user=>{

    const texts =
      stats[user].texts.join(" ").toLowerCase();

    const behavior =
      analyzeBehaviorUser(stats[user].texts);

    let userFlags = [];

    const msgCount =
      stats[user].messages;

    // 😡 TOXIC / INSULTING
    if(/idiot|stupid|dumb|shut up|fuck you|chutiya|madarchod|bitch|hate you|leave me/.test(texts)){
      userFlags.push(
        "😡 Uses insulting or toxic language"
      );
    }

    // 😶 DRY TEXTER
    if(behavior.drytexter > 45){
      userFlags.push(
        "😶 Gives low effort replies"
      );
    }

    // 📵 GHOSTING
    if((ghost[user] || 0) > 5){
      userFlags.push(
        "📵 Disappears for long periods"
      );
    }

    // 💤 NEVER INITIATES
    if((starters[user] || 0) < 3){
      userFlags.push(
        "💤 Rarely starts conversations"
      );
    }

    // 📉 LOW EFFORT
    if(msgCount < messages.length * 0.2){
      userFlags.push(
        "📉 Puts very little effort"
      );
    }

    // 🧠 SELFISH
    const selfWords =
      (texts.match(/\bi\b|\bme\b|\bmy\b/g) || [])
      .length;

    const caringWords =
      (texts.match(/you|your|u|take care|how are you|ate\?|sleep/g) || [])
      .length;

    if(selfWords > caringWords * 2){
      userFlags.push(
        "🧠 Seems more self-focused"
      );
    }

    // 💔 EMOTIONALLY UNAVAILABLE
    if(
      !/love|miss|care|proud of you|take care|❤️|🥰|😘/.test(texts)
      &&
      msgCount > 40
    ){
      userFlags.push(
        "💔 Avoids emotional expression"
      );
    }

    // 🎭 MIXED SIGNALS
    if(
      /love|miss|care/.test(texts)
      &&
      /leave me|bye forever|dont text/.test(texts)
    ){
      userFlags.push(
        "🎭 Gives mixed emotional signals"
      );
    }

    // 👀 ATTENTION SEEKER
    const attention =
      (texts.match(/where are you|reply|why ignoring|hello\?\?\?|talk to me/g) || [])
      .length;

    if(attention > 5){
      userFlags.push(
        "👀 Constantly seeks attention"
      );
    }

    // 🚩 MANIPULATIVE
    if(
      /if you loved me|you dont care|prove it|fine i’ll leave/.test(texts)
    ){
      userFlags.push(
        "🚩 Shows manipulative behavior"
      );
    }

    // 😤 OVERREACTS
    if(
      /always|never|everytime|you always|you never/.test(texts)
    ){
      userFlags.push(
        "😤 Tends to overreact in arguments"
      );
    }

    // ❤️ GREEN FLAG
    if(userFlags.length === 0){
      userFlags.push(
        "💚 No major red flags detected"
      );
    }

    flags[user] = userFlags;

  });

  return flags;
}

function getConversationPhases(messages){

  const phases = {};

  messages.forEach(m=>{

    if(!m.user) return;

    const user = m.user;
    const text = (m.message || "").toLowerCase();

    if(!phases[user]){
      phases[user] = {
        love:0,
        fun:0,
        emotional:0,
        dry:0,
        toxic:0,
        interest:0
      };
    }

    // 💖 LOVE
 // 💖 LOVE / ROMANTIC
if(/❤️|💖|💕|💗|💘|💝|🥰|😍|😘|love|baby|babe|jaan|miss you|pyar|cutie|mine|hubby|wife|future together|marry|kiss/.test(text)){
  phases[user].love += 5;
  phases[user].interest += 4;
}

// 😂 FUN / CHAOTIC
if(/😂|🤣|😹|😆|haha|lol|hehe|lmao|bro|fun|meme|rofl|xD|💀|😭😂/.test(text)){
  phases[user].fun += 4;
  phases[user].interest += 2;
}

// 😭 EMOTIONAL / DEEP
if(/😭|🥺|sad|cry|hurt|pain|alone|upset|miss|depressed|anxiety|stress|broken|lonely|care about you/.test(text)){
  phases[user].emotional += 4;
}

// 😡 TOXIC / ARGUMENT
if(/fuck|shit|bc|mc|idiot|hate|mad|annoy|stupid|leave me|shut up|toxic|angry/.test(text)){
  phases[user].toxic += 5;
}

// 😳 FLIRTY
if(/😏|😉|hot|sexy|attractive|date|crush|flirt|pretty|handsome|cute smile/.test(text)){
  phases[user].love += 3;
  phases[user].interest += 3;
}

// 🫂 SUPPORTIVE
if(/take care|proud of you|i got you|dont worry|be safe|eat food|sleep well|you can do it/.test(text)){
  phases[user].emotional += 3;
  phases[user].interest += 3;
}

// 🤡 CHAOTIC BESTIES
if(/clown|pagal|crazy|wtf|brainrot|random|sus|goofy/.test(text)){
  phases[user].fun += 3;
}

// 😶 AWKWARD
if(/hmm|uhh|idk|okay then|whatever/.test(text)){
  phases[user].dry += 1;
}

// 🥱 SUPER DRY
if(/^(ok|k|hm|👍)$/i.test(text)){

}

  });

  return phases;

function getInterestTrend(messages){

  const stats = userStats(messages);
  const users = Object.keys(stats);

  const chunks = 5;

  const size = Math.max(
    1,
    Math.floor(messages.length / chunks)
  );

  let trend = {};

  users.forEach(user=>{

    let activity = [];

    for(let i=0;i<chunks;i++){

      const slice =
        messages.slice(i*size,(i+1)*size);

      // 💬 msg count
      const userMsgs =
        slice.filter(m=>m.user===user).length;

      // ⚡ replies
      const replies =
        slice.filter((m,idx)=>{

          if(idx===0) return false;

          return (
            m.user===user &&
            slice[idx-1].user!==user
          );

        }).length;

      // ❤️ emotional effort
      const emotional =
        slice.filter(m=>
          m.user===user &&
          /❤️|🥰|😍|😘|😭|🥺|😂|🤣|love|care|miss|cute/i
          .test(m.message || "")
        ).length;

      // 🧠 long msgs
      const longMsgs =
        slice.filter(m=>
          m.user===user &&
          (m.message || "").length > 60
        ).length;

      const score =
        userMsgs +
        replies*1.5 +
        emotional*2 +
        longMsgs*2;

      activity.push(score);
    }

    const first = activity[0];
    const last = activity[activity.length-1];

    const avg =
      activity.reduce((a,b)=>a+b,0)
      / activity.length;

    const peak = Math.max(...activity);
    const low = Math.min(...activity);

    const diff = last - first;

    const variance = peak - low;

    // 🔥 SMART CLASSIFICATION

    let result = {};

    // 📈 increasing slowly
    if(diff > avg * 0.35){

      result = {
        emoji:"📈",
        text:"Growing closer",
        desc:"Interest slowly increased over time."
      };

    }

    // 📉 fading
    else if(diff < -avg * 0.35){

      result = {
        emoji:"📉",
        text:"Losing interest",
        desc:"Replies and effort slowly reduced."
      };

    }

    // 🚀 sudden spike
    else if(last > avg * 1.7){

      result = {
        emoji:"🚀",
        text:"Sudden spike",
        desc:"Recent conversations became highly active."
      };

    }

    // 🥶 colder now
    else if(last < avg * 0.5){

      result = {
        emoji:"🥶",
        text:"Got colder",
        desc:"Conversations recently became dry."
      };

    }

    // 😵 inconsistent
    else if(variance > avg * 1.2){

      result = {
        emoji:"😵",
        text:"On & off energy",
        desc:"Interest keeps fluctuating heavily."
      };

    }

    // 🔥 peak phase
    else if(peak > avg * 1.8){

      result = {
        emoji:"🔥",
        text:"Peak interest phase",
        desc:"There was a very intense phase."
      };

    }

    // 💞 balanced
    else{

      result = {
        emoji:"💞",
        text:"Consistent effort",
        desc:"Interest stayed healthy and balanced."
      };

    }

    trend[user] = result;

  });

  return trend;
}

function calculateWhoThinksMore(messages){

  const users = [...new Set(messages.map(m=>m.user))];

  if(users.length < 2) return {};

  const scores = {};

  users.forEach(user=>{

    scores[user] = 0;

    const userMsgs =
      messages.filter(m=>m.user===user);

    userMsgs.forEach((m,idx)=>{

      const text =
        (m.message || "").toLowerCase();

      // 💖 emotional / caring
      if(/miss|love|care|thinking|need you|baby|jaan|cute|take care|goodnight|good morning/.test(text)){
        scores[user] += 4;
      }

      // 🧠 long messages
      if(text.length > 80){
        scores[user] += 3;
      }

      // 😭 emotional effort
      if(/😭|🥺|❤️|💖|💕|😘|🥰/.test(text)){
        scores[user] += 3;
      }

      // 👀 double texting
      if(
        idx > 0 &&
        userMsgs[idx-1] &&
        userMsgs[idx-1].user === user
      ){
        scores[user] += 2;
      }

      // 🧠 asking about person
      if(/\byou\b|\bu\b|wyd|where are you|ate\?|sleep|how are you/.test(text)){
        scores[user] += 2;
      }

    });

  });

  return scores;
}

document.getElementById("fileInput")
.addEventListener("change", function(){

  const fileName =
    this.files[0]?.name || "No file selected";

  document.getElementById("fileName")
    .innerText = fileName;
});
function createMonthlyChart(messages){

  const monthNames = [
    "Jan","Feb","Mar","Apr","May","Jun",
    "Jul","Aug","Sep","Oct","Nov","Dec"
  ];

  let monthlyCount = {};

  messages.forEach(m => {

    if(!m.date) return;

    const parts = m.date.split("/");
    if(parts.length < 2) return;

    const mo = parseInt(parts[1]);

    // 🚨 skip invalid months
    if(isNaN(mo) || mo < 1 || mo > 12) return;

    const month = monthNames[mo - 1];

    if(!month) return;

    monthlyCount[month] =
      (monthlyCount[month] || 0) + 1;
  });

  const labels = Object.keys(monthlyCount);

  const data = Object.values(monthlyCount);

  // 🚨 remove undefined safety (extra protection)
  const cleanLabels = labels.filter(l => l && l !== "undefined");
  const cleanData = data.slice(0, cleanLabels.length);

  if(window.monthlyChartInstance){
    window.monthlyChartInstance.destroy();
  }

  window.monthlyChartInstance = new Chart(
    document.getElementById("monthlyChatChart"),
    {
      type: "bar",
      data: {
        labels: cleanLabels,
        datasets: [{
          label: "Chats per Month",
          data: cleanData,
          backgroundColor: "#ff4d6d",
          borderRadius: 10
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: (ctx) => `${ctx.raw} messages`
            }
          }
        },
        scales: {
          y: {
            beginAtZero: true
          }
        }
      }
    }
  );
}
function renderMonthlySummary(messages){

  const monthNames = [
    "Jan","Feb","Mar","Apr","May","Jun",
    "Jul","Aug","Sep","Oct","Nov","Dec"
  ];

  let monthly = {};
  let userTotal = {};

  messages.forEach(m => {
    if(!m.date || !m.user) return;

    const parts = m.date.split("/");
    if(parts.length < 2) return;

    const mo = parseInt(parts[1]) - 1;

    const month = monthNames[mo];

    if(!month) return;

    monthly[month] = (monthly[month] || 0) + 1;
    userTotal[m.user] = (userTotal[m.user] || 0) + 1;
  });

  const monthEntries = Object.entries(monthly);

  if(monthEntries.length === 0){
    document.getElementById("monthlySummary").innerHTML =
      "No monthly data found";
    return;
  }

  const topMonth = monthEntries.reduce((a,b)=>
    b[1] > a[1] ? b : a
  );

  const userEntries = Object.entries(userTotal);

  const topUser = userEntries.length
    ? userEntries.reduce((a,b)=>
        b[1] > a[1] ? b : a
      )
    : ["Unknown", 0];

  const totalChats = messages.length;

  const avgPerMonth =
    Math.round(totalChats / monthEntries.length);

  document.getElementById("monthlySummary").innerHTML = `
    <h3 style="margin-bottom:10px; color:#7b4dff;">
      📊 Monthly Chat Summary
    </h3>

    <p>🔥 Most active month: <b>${topMonth[0]}</b> (${topMonth[1]} chats)</p>

    <p>👑 Most active user: <b>${topUser[0]}</b> (${topUser[1]} chats)</p>

    <p>💬 Total chats: <b>${totalChats}</b></p>

    <p>📅 Average per month: <b>${avgPerMonth}</b></p>

    <hr style="margin:10px 0; border:0; border-top:1px solid #ddd;">

    <p style="color:#555;">
      ${topMonth[0]} was the most active month with highest conversation activity.
    </p>
  `;
}

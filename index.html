// 🔥 find broken message
const broken = messages.find(m =>

console.log("BROKEN MESSAGE:", broken);
 const replyAvg = getReplySpeed(messages) || {};
 console.log("replyAvg:", replyAvg);
const replyScore = normalizeSpeed(replyAvg);
createReplyChart(replyAvg);
 const ghostData = getGhosting(messages);

document.getElementById("ghostSection").innerHTML =

<p style="opacity:0.8">${rel.score}% compatibility</p>

  html += `<div class="insights-grid">`;

  Object.keys(stats).forEach(user => {

    let u = stats[user];
    const userBehavior = analyzeBehaviorUser(u.texts);
    const tag = getPersonalityTag(userBehavior);

html += `
<div class="user-card">

/* ===== FIXED USER STATS ===== */

function userStats(messages){
  const users={};

  messages.forEach(m=>{
  if(!m.user) return;
    if(!users[m.user]){
      users[m.user]={messages:0,words:{},emojis:{},texts:[]};
    }
    
    let u=users[m.user];
   const msg = m.message || m.text || "";
u.texts.push(msg);
    u.messages++;

const cleanText = m.message
  .toLowerCase()
  .replace(/<media omitted>/gi, "")  // remove full phrase
  .replace(/media omitted/gi, "")    // remove variant
  .replace(/omitted/gi, "")          // safety remove
  .replace(/[^\w\s]/g, "");          // remove symbols

const words = cleanText.split(/\s+/);
    words.forEach(w=>{
      if(w.length>2){
        u.words[w]=(u.words[w]||0)+1;
      }
    });
    const stopWords = ["hai","the","and","for","you","this","that","are","was"];

words.forEach(w=>{
  if(w.length > 2 && !stopWords.includes(w)){
    u.words[w] = (u.words[w] || 0) + 1;
  }
});

    const emojis=[...m.message.matchAll(/\p{Extended_Pictographic}/gu)].map(e=>e[0]);

    emojis.forEach(e=>{
      u.emojis[e]=(u.emojis[e]||0)+1;
    });
  });

  return users;
}

function getTopWordsWithCount(obj,n=5){
  return Object.entries(obj).sort((a,b)=>b[1]-a[1]).slice(0,n);
}

function getPercent(obj){
  let total=Object.values(obj).reduce((a,b)=>a+b,0)||1;
  let result={};
  for(let k in obj){
    result[k]=Math.round((obj[k]/total)*100);
  }
  return result;
}

function analyzeBehavior(messages){
 let score={
  happy:0,
  sad:0,
  angry:0,
  sweet:0,
  kind:0,
  abusive:0,
  "depressing/short":0
};

 messages.forEach(text=>{
  if(!text) return;
  text = text.toLowerCase().trim();

  // ===== HAPPY =====
  const happyMatches = text.match(/😂|🤣|😆|😜|😝|😀|😁|😉|😗|😙|😋|😛|😊|👀|🫢|👽|💀|haha|hehe|lol|lmao|mja|nice|wow|fun|yes/g);
  if(happyMatches) score.happy += happyMatches.length;

  // ===== SAD =====
  const sadMatches = text.match(/😭|😢|😞|🙁|☹️|😕|sad|upset|cry|miss|hurt/g);
  if(sadMatches) score.sad += sadMatches.length;

  // ===== DEPRESSING / SHORT =====

  // 1. Emojis + words
  const depressingMatches = text.match(/😐|😔|😰|🥲|🫤|🤧|tired|alone|low|low text|low msg|no reply|dry chat|depressed|empty|nothing/g);
  if(depressingMatches){
    score["depressing/short"] += depressingMatches.length;
  }

  // 2. Short replies detection 🔥
  const shortReplies = ["ok","k","hmm","hmmm","hm","kk","ya","yes","no","h","👍"];

  if(text.length <= 3 || shortReplies.includes(text)){
    score["depressing/short"] += 1;
  }

  // ===== OTHER =====
  const angryMatches = text.match(/😡|🤨|😠|😤|😮‍💨|😒|🙄|😐|😑|🤐|🫡|angry|mad|annoy|irritate|frustrated/g);

if(angryMatches){
  score.angry += angryMatches.length;
}
  if(/love|❤️|luv|omg|miss|like|sex|hot|pyar/.test(text)) score.sweet++;
  if(/thanks|sorry|pls|please/.test(text)) score.kind++;
  if(/bc|mc|fuck|shit|abe/.test(text)) score.abusive++;

});

  return score;
}

function advancedRelationship(messages){

  const users = [...new Set(messages.map(m=>m.user))];

  // Only for 2 users
 if(users.length !== 2){

  let activityScore = messages.length;

  // simple scaling
  let score = Math.min(100, Math.round(activityScore / 5));

  return {
    status: "🤝 Chat Bond",
    score: score
  };
}

  let score = {
    love:0,
    fun:0,
    emotional:0
  };

  messages.forEach(m=>{
    const text = (m.message || m.text || "").toLowerCase();

    // ===== 💖 ROMANTIC =====
    const romanticMatches = text.match(/love|luv|baby|jaan|miss you|i like you|🥰|🥵|😍|🤩|👄|❤️|🩷|🧡|💛|💚|💙|🩵|💜|🖤|🩶|🤍|🤎|❤️‍🔥|❤️‍🩹|❣️|💕|💞|💓|💗|💖|💘|💝/g);
    if(romanticMatches){
      score.love += romanticMatches.length;
    }

    // ===== 😂 FRIENDS / FUN =====
    const funMatches = text.match(/😃|😄|😁|😆|😅|😂|🤣|🥲|🥹|☺️|😊|😇|🙂|🙃|😉|😌|lol|lmao|haha|hehe|fun|masti|bro|bhai/g);
    if(funMatches){
      score.fun += funMatches.length;
    }

    // ===== 😭 EMOTIONAL =====
    const emotionalMatches = text.match(/🤧|😭|😢|😞|😔|😟|😣|😖|😫|😩|😓|😱|sad|cry|hurt|miss|alone|tired|depressed|pain|stress/g);
    if(emotionalMatches){
      score.emotional += emotionalMatches.length;
    }

  });

  // ===== 🎯 SCORE CALCULATION =====
  let finalScore = 0;

  finalScore += score.fun * 2;
  finalScore += score.love * 4;
  finalScore += score.emotional * 3;

  finalScore = Math.min(100, Math.round(finalScore / 5));

  // ===== 🎭 RELATION TYPE =====
  let status = "🤝 Friends";

  if(score.love > 25){
    status = "💖 Lover";
  }
  else if(score.love > 10){
    status = "💕 Romantic";
  }
  else if(score.fun > score.emotional){
    status = "😂 Best Friends";
  }

  return {
    status,
    score: finalScore
  };
}
function getActivityInsights(activity){
  let html = "";

  Object.keys(activity).forEach(user=>{
    const hours = activity[user];
    const max = Math.max(...hours);
    const peak = hours.indexOf(max);

    const label = [
      "12AM","1AM","2AM","3AM","4AM","5AM",
      "6AM","7AM","8AM","9AM","10AM","11AM",
      "12PM","1PM","2PM","3PM","4PM","5PM",
      "6PM","7PM","8PM","9PM","10PM","11PM"
    ];

    let type = "☀️ Day User";
    if(peak >= 22 || peak <= 4) type = "🌙 Night Owl";

    html += `
      <div class="insight">
        <b>${user}</b> is most active at 
        ${label[peak]} (${max} msgs) — ${type}
      </div>
    `;
  });

  return html;
}
function getTime(m){
  if(!m.date || !m.time) return 0;

  let [time, modifier] = m.time.split(" ");
  let [h, min] = time.split(":");

  h = parseInt(h);
  min = parseInt(min);

  if(modifier){
    if(modifier.toLowerCase() === "pm" && h !== 12) h += 12;
    if(modifier.toLowerCase() === "am" && h === 12) h = 0;
  }

  let [d, mo, y] = m.date.split("/");

  // fix year like 26 → 2026
  if(y.length === 2) y = "20" + y;

  return new Date(y, mo - 1, d, h, min).getTime();
}

function getReplySpeed(messages){
  const replyTimes = {};

  messages.sort((a,b)=>getTime(a) - getTime(b));

  for(let i = 1; i < messages.length; i++){
    const prev = messages[i-1];
    const curr = messages[i];

    // only when user switches
    if(prev.user !== curr.user){

      const t1 = getTime(prev);
      const t2 = getTime(curr);

      const diff = (t2 - t1) / 1000;

      // ✅ ONLY count real replies (within 30 min)
      if(diff > 0 && diff < 3600){

        if(!replyTimes[curr.user]){
          replyTimes[curr.user] = [];
        }

        replyTimes[curr.user].push(diff);
      }
    }
  }

  const avg = {};

  Object.keys(replyTimes).forEach(user=>{
    const arr = replyTimes[user];
    const sum = arr.reduce((a,b)=>a+b,0);
    avg[user] = sum / arr.length;
  });

  return avg;
}
function getReplySpeedPairs(messages){

  const pairs = {};

  messages.sort((a,b)=>new Date(a.date) - new Date(b.date));

  for(let i = 1; i < messages.length; i++){
    const prev = messages[i-1];
    const curr = messages[i];

    if(prev.user !== curr.user){

      // 🔥 find START of previous user's block
      let j = i - 1;

      while(j > 0 && messages[j-1].user === prev.user){
        j--;
      }

      const firstPrev = messages[j];

      const t1 = getTime(firstPrev);
const t2 = getTime(curr);
      const diff = (t2 - t1) / 1000;

     if(diff > 1){ // 12 HOURS

        const key = `${prev.user} → ${curr.user}`;

        if(!pairs[key]){
          pairs[key] = [];
        }

        pairs[key].push(diff);
      }
    }
  }

  const avg = {};

  Object.keys(pairs).forEach(k=>{
    const arr = pairs[k];
    const sum = arr.reduce((a,b)=>a+b,0);
    avg[k] = sum / arr.length;
  });

  return avg;
}
function formatTime(sec){
  if(sec < 60) return `${Math.round(sec)} sec`;
  if(sec < 3600) return `${Math.round(sec/60)} min`;
  if(sec < 86400) return `${Math.round(sec/3600)} hr`;
  return `${Math.round(sec/86400)} days`;
}
function renderPairReply(pairs){

  const sorted = Object.entries(pairs)
    .sort((a,b)=>a[1]-b[1]); // fastest first

  let html = `
    <div class="section">
      <div class="section-title">🔁 Reply Relationships</div>
  `;

  sorted.forEach(([pair,time])=>{
    html += `
      <div class="reply-item">
        <span>${pair}</span>
        <span>${formatTime(time)}</span>
      </div>
    `;
  });

  html += `</div>`;

  return html;
}

function renderReplySpeed(replyAvg, replyScore){
  let html = `<div class="section">
    <div class="section-title">⚡ Reply Speed</div>
  `;

  const users = Object.keys(replyScore)
    .sort((a,b)=>replyScore[b]-replyScore[a]);

  users.forEach(user=>{
    html += `
      <div style="margin-top:10px;">
        <div style="display:flex; justify-content:space-between;">
          <span>${user}</span>
          <span>${formatTime(replyAvg[user] || 0)}</span>
        </div>

        <div class="big-bar">
          <div class="big-fill" style="width:${replyScore[user]}%"></div>
        </div>
      </div>
    `;
  });

  html += `</div>`;

  return html;

function getGhosting(messages){
  const ghost = {};

  messages.sort((a,b)=>getTime(a) - getTime(b));

  for(let i = 1; i < messages.length; i++){
    const prev = messages[i-1];
    const curr = messages[i];

    if(prev.user !== curr.user){

      const t1 = getTime(prev);
      const t2 = getTime(curr);
      const diff = (t2 - t1) / 1000;

      // ❗ if reply takes too long → ghosting
      if(diff > 3600){ // 1 hour+

        if(!ghost[curr.user]){
          ghost[curr.user] = 0;
        }

        ghost[curr.user]++;
      }
    }
  }

  return ghost;
}

function getActivityByHour(messages){
  const result = {};

  messages.forEach(m=>{
    if(!m.user) return;

    let hour = 0;

    // ✅ USE TIME FIELD DIRECTLY (NO Date parsing)
    if(m.time){
      let [time, modifier] = m.time.split(" ");
      let [h, min] = time.split(":");

      h = parseInt(h);

      if(modifier){
        if(modifier.toLowerCase() === "pm" && h !== 12) h += 12;
        if(modifier.toLowerCase() === "am" && h === 12) h = 0;
      }

      hour = h;
    }

    if(!result[m.user]){
      result[m.user] = new Array(24).fill(0);
    }

    result[m.user][hour]++;
  });

  return result;
}

function normalizeSpeed(avg){
  const values = Object.values(avg);

  // ✅ FIX: handle empty case
  if(values.length === 0){
    return {};
  }

  const max = Math.max(...values);
  const min = Math.min(...values);

  const result = {};

  Object.keys(avg).forEach(user=>{
    result[user] = max === min 
      ? 1 
      : 1 - ((avg[user] - min) / (max - min));
  });

  return result;
}

function getConversationStarters(messages){
  const starters = {};

  messages.sort((a,b)=>getTime(a) - getTime(b));

  let lastTime = 0;
  let lastUser = null;

  for(let i = 0; i < messages.length; i++){
    const curr = messages[i];
    const t = getTime(curr);

    // first message
    if(i === 0){
      starters[curr.user] = (starters[curr.user] || 0) + 1;
      lastTime = t;
      lastUser = curr.user;
      continue;
    }

    const diff = (t - lastTime) / 1000;

    // 🔥 NEW CONVERSATION if gap > 1 hour
    if(diff > 3600){

      starters[curr.user] = (starters[curr.user] || 0) + 1;
    }

    lastTime = t;
    lastUser = curr.user;
  }

  return starters;
}

  sorted.forEach(([user,count],i)=>{

    html += `
      <div class="reply-item">
        <span>${user}</span>
        <span>${count} starts • ${label}</span>
      </div>
    `;
  });

  html += `</div>`;
  return html;
}
